spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  liquibase:
    enabled: true
    change-log: classpath:/db/migration/db.changelog-master.yaml

app:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    expiration: 86400
  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
  encryption:
    key: ${ENCRYPTION_KEY}
    salt: ${ENCRYPTION_SALT}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false