spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/bankcards
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  liquibase:
    enabled: false
    change-log: classpath:/db/migration/db.changelog-master.yaml

springdoc:
  swagger-ui:
    display-request-duration: true
    try-it-out-enabled: true
    enabled: true
  api-docs:
    enabled: true
    path: /v3/api-docs