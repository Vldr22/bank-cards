      parameters:
      - name: cardId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "404":
          description: Карта не найдена
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommonResponseVoid"
        "403":
          description: Недостаточно прав
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommonResponseVoid"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommonResponseVoid"
        "422":
          description: Unprocessable Entity
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommonResponseVoid"
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommonResponseVoid"
        "401":
          description: Токен отсутствует или истёк
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommonResponseVoid"
        "500":
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommonResponseVoid"
        "204":
          description: Карта удалена
